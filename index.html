<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chef de Refri - IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        body { overscroll-behavior-y: contain; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .btn-active:active { transform: scale(0.96); }
    </style>
</head>
<body class="min-h-screen font-sans antialiased text-slate-900">

    <div class="max-w-md mx-auto min-h-screen flex flex-col">
        <header class="p-6 text-center">
            <h1 class="text-3xl font-extrabold text-blue-600 tracking-tight italic">🍳 Chef de Refri</h1>
            <p class="text-slate-500 text-sm mt-1 uppercase tracking-widest font-bold">Inteligencia Artificial</p>
        </header>

        <div class="flex-1 px-4 flex flex-col">
            <!-- Contenedor de Cámara -->
            <div id="viewfinder" class="relative bg-black rounded-3xl overflow-hidden aspect-[3/4] shadow-2xl flex items-center justify-center border-4 border-white">
                <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
                <canvas id="canvas" class="hidden"></canvas>
                <img id="photo-preview" class="hidden w-full h-full object-cover">
                
                <div id="start-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/90 text-white p-8 text-center transition-opacity">
                    <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mb-6 shadow-xl animate-bounce">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        </svg>
                    </div>
                    <p class="text-lg font-bold">¡Listo para cocinar!</p>
                    <p class="text-sm opacity-70 mt-2">Toca el botón azul para iniciar la cámara.</p>
                </div>
            </div>

            <!-- Botones -->
            <div class="mt-6 space-y-3 pb-10">
                <button id="btn-start" class="btn-active w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-lg transition-all text-lg uppercase tracking-wider">
                    🚀 ENCENDER CÁMARA
                </button>

                <button id="btn-capture" class="hidden btn-active w-full bg-emerald-500 text-white font-black py-5 rounded-2xl shadow-lg transition-all text-lg uppercase tracking-wider">
                    📸 TOMAR FOTO Y ANALIZAR
                </button>

                <button id="btn-reset" class="hidden btn-active w-full bg-slate-200 text-slate-700 font-bold py-4 rounded-2xl transition-all">
                    🔄 INTENTAR OTRA VEZ
                </button>

                <!-- Status / Loading -->
                <div id="status-container" class="hidden text-center py-6 bg-white rounded-2xl shadow-xl border-2 border-blue-500 animate-pulse">
                    <div class="loader mx-auto mb-3 rounded-full border-4 border-slate-100 h-10 w-10 border-t-blue-600"></div>
                    <p id="status-text" class="text-blue-700 font-black uppercase text-xs tracking-widest px-4 text-center">Analizando imagen...</p>
                </div>
            </div>
        </div>

        <!-- Resultados -->
        <div id="results" class="hidden px-4 pb-20">
            <div class="bg-white rounded-[2.5rem] p-8 shadow-2xl border border-slate-100 relative">
                <h2 id="res-title" class="text-3xl font-black text-slate-800 mb-6 leading-tight"></h2>
                
                <div class="bg-blue-50 p-4 rounded-2xl mb-8">
                    <span class="text-[10px] uppercase font-black tracking-[0.2em] text-blue-600 block mb-2 text-center">Ingredientes Detectados</span>
                    <p id="res-items" class="text-slate-800 text-base font-semibold italic text-center"></p>
                </div>

                <div class="space-y-8">
                    <div>
                        <h3 class="font-black text-slate-800 uppercase tracking-tighter text-sm flex items-center gap-2 mb-4">
                            <span class="w-8 h-8 bg-amber-400 text-white rounded-full flex items-center justify-center shadow-md">1</span>
                            ¿Qué necesitas?
                        </h3>
                        <ul id="res-ingredients" class="space-y-3 text-slate-700 text-base font-medium list-none"></ul>
                    </div>

                    <div>
                        <h3 class="font-black text-slate-800 uppercase tracking-tighter text-sm flex items-center gap-2 mb-4">
                            <span class="w-8 h-8 bg-emerald-500 text-white rounded-full flex items-center justify-center shadow-md">2</span>
                            Pasos de la Receta
                        </h3>
                        <div id="res-steps" class="space-y-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuración de la API (Gemini)
        const apiKey = ""; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const photoPreview = document.getElementById('photo-preview');
        const btnStart = document.getElementById('btn-start');
        const btnCapture = document.getElementById('btn-capture');
        const btnReset = document.getElementById('btn-reset');
        const startOverlay = document.getElementById('start-overlay');
        const statusContainer = document.getElementById('status-container');
        const results = document.getElementById('results');

        // Función para manejar la cámara en WebView
        btnStart.addEventListener('click', async () => {
            try {
                const constraints = {
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                startOverlay.classList.add('opacity-0', 'pointer-events-none');
                btnStart.classList.add('hidden');
                btnCapture.classList.remove('hidden');
            } catch (err) {
                console.error("Camera Error:", err);
                alert("ERROR: No se pudo acceder a la cámara. Ve a los Ajustes de tu teléfono > Aplicaciones > Chef de Refri > Permisos y activa la Cámara.");
            }
        });

        // Capturar y Procesar
        btnCapture.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            // Ajustar tamaño para que la IA procese rápido (máximo 800px)
            const scale = Math.min(1, 800 / Math.max(video.videoWidth, video.videoHeight));
            canvas.width = video.videoWidth * scale;
            canvas.height = video.videoHeight * scale;
            
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Calidad 0.4 para reducir el peso y evitar errores de red en APKs restrictivas
            const base64Image = canvas.toDataURL('image/jpeg', 0.4);
            
            photoPreview.src = base64Image;
            photoPreview.classList.remove('hidden');
            video.classList.add('hidden');
            btnCapture.classList.add('hidden');
            btnReset.classList.remove('hidden');
            
            processWithAI(base64Image.split(',')[1]);
        });

        btnReset.addEventListener('click', () => {
            photoPreview.classList.add('hidden');
            video.classList.remove('hidden');
            btnReset.classList.add('hidden');
            btnCapture.classList.remove('hidden');
            results.classList.add('hidden');
        });

        // Llamada a la IA optimizada para móviles
        async function processWithAI(base64Data) {
            statusContainer.classList.remove('hidden');
            results.classList.add('hidden');

            const prompt = "Eres un Chef IA. Analiza los alimentos en esta foto y dame una receta creativa. Responde EXTRICTAMENTE con un JSON: {\"titulo\": \"\", \"detectados\": \"\", \"ingredientes\": [], \"pasos\": []}";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                            ]
                        }],
                        generationConfig: { 
                            responseMimeType: "application/json",
                            maxOutputTokens: 1000 
                        }
                    })
                });

                if (!response.ok) throw new Error("Status " + response.status);

                const data = await response.json();
                const recipeText = data.candidates[0].content.parts[0].text;
                renderRecipe(JSON.parse(recipeText));
                
            } catch (err) {
                console.error("AI Error:", err);
                alert("ERROR DE RED: La IA no pudo responder. Revisa tu conexión a Internet o los permisos de la App.");
            } finally {
                statusContainer.classList.add('hidden');
            }
        }

        function renderRecipe(data) {
            document.getElementById('res-title').innerText = data.titulo || "Receta Sugerida";
            document.getElementById('res-items').innerText = data.detectados || "Alimentos detectados";
            
            const ingList = document.getElementById('res-ingredients');
            ingList.innerHTML = '';
            (data.ingredientes || []).forEach(i => {
                const li = document.createElement('li');
                li.className = "flex items-center gap-3 bg-white p-2 rounded-lg border border-slate-50 shadow-sm";
                li.innerHTML = `<span class="w-2 h-2 bg-amber-400 rounded-full"></span> <span class="text-sm font-semibold">${i}</span>`;
                ingList.appendChild(li);
            });

            const stepsDiv = document.getElementById('res-steps');
            stepsDiv.innerHTML = '';
            (data.pasos || []).forEach((p, i) => {
                const step = document.createElement('div');
                step.className = "flex gap-4 p-4 bg-white rounded-2xl border border-slate-100 shadow-sm";
                step.innerHTML = `<span class="font-black text-emerald-500 text-lg">${i+1}</span><p class="text-slate-700 text-sm font-medium leading-relaxed">${p}</p>`;
                stepsDiv.appendChild(step);
            });

            results.classList.remove('hidden');
            setTimeout(() => results.scrollIntoView({ behavior: 'smooth' }), 200);
        }
    </script>
</body>
</html>
