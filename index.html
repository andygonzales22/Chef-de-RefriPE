<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chef de Refri - IA</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Manifest para que parezca App -->
    <link rel="manifest" href="data:application/json;base64,ewogICJpbmRleCI6ICJpbmRleC5odG1sIiwKICAidGhlbWVfY29sb3IiOiAiIzI1NjNlYiIsCiAgImJhY2tncm91bmRfY29sb3I6ICIjZmZmZmZmIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAic2NvcGUiOiAiLiIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAibmFtZSI6ICJDaGVmIGRlIFJlZnJpIiwKICAic2hvcnRfbmFtZSI6ICJDaGVmUmVmcGkiCn0=">
    <style>
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        video { transform: scaleX(1); } /* Evitar efecto espejo en cámara trasera */
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-900">

    <div class="max-w-md mx-auto min-h-screen flex flex-col">
        <!-- Header -->
        <header class="p-6 text-center">
            <h1 class="text-3xl font-extrabold text-blue-600 tracking-tight">🍳 Chef de Refri</h1>
            <p class="text-slate-500 text-sm mt-1">IA que cocina con lo que tienes</p>
        </header>

        <!-- Camera Section -->
        <div class="flex-1 px-4 flex flex-col">
            <div id="viewfinder" class="relative bg-black rounded-3xl overflow-hidden aspect-[3/4] shadow-2xl flex items-center justify-center">
                <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
                <canvas id="canvas" class="hidden"></canvas>
                <img id="photo-preview" class="hidden w-full h-full object-cover">
                
                <!-- Overlay informativo -->
                <div id="start-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/80 text-white p-8 text-center transition-opacity">
                    <div class="w-16 h-16 bg-blue-500 rounded-full flex items-center justify-center mb-4 shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        </svg>
                    </div>
                    <p class="font-medium">Para empezar, permite el acceso a la cámara.</p>
                    <p class="text-xs opacity-60 mt-2">Asegúrate de estar usando HTTPS</p>
                </div>
            </div>

            <!-- Botones de Acción -->
            <div class="mt-6 space-y-3 pb-8">
                <button id="btn-start" class="w-full bg-blue-600 active:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2">
                    <span>🚀 Iniciar Cámara</span>
                </button>

                <button id="btn-capture" class="hidden w-full bg-emerald-500 active:bg-emerald-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-all">
                    📸 Tomar Foto y Analizar
                </button>

                <button id="btn-reset" class="hidden w-full bg-slate-200 text-slate-700 font-bold py-4 rounded-2xl transition-all">
                    🔄 Intentar de nuevo
                </button>

                <!-- Status / Loading -->
                <div id="status-container" class="hidden text-center py-4 bg-white rounded-2xl shadow-inner animate-pulse">
                    <div class="loader mx-auto mb-2 ease-linear rounded-full border-4 border-slate-100 h-8 w-8"></div>
                    <p id="status-text" class="text-sm font-medium text-slate-600">Procesando con IA...</p>
                </div>
            </div>
        </div>

        <!-- Resultados -->
        <div id="results" class="hidden px-4 pb-12">
            <div class="bg-white rounded-3xl p-6 shadow-xl border border-slate-100">
                <h2 id="res-title" class="text-2xl font-black text-slate-800 mb-4"></h2>
                
                <div class="mb-6">
                    <span class="text-[10px] uppercase font-bold tracking-widest text-blue-500">Ingredientes encontrados</span>
                    <p id="res-items" class="text-slate-600 text-sm italic mt-1"></p>
                </div>

                <div class="space-y-6">
                    <div>
                        <h3 class="font-bold text-slate-800 flex items-center gap-2">
                            <span class="w-6 h-6 bg-amber-100 text-amber-600 rounded-md flex items-center justify-center text-xs">1</span>
                            Lista de Compras
                        </h3>
                        <ul id="res-ingredients" class="mt-3 space-y-2 text-slate-600 text-sm list-disc pl-5"></ul>
                    </div>

                    <div>
                        <h3 class="font-bold text-slate-800 flex items-center gap-2">
                            <span class="w-6 h-6 bg-emerald-100 text-emerald-600 rounded-md flex items-center justify-center text-xs">2</span>
                            Preparación
                        </h3>
                        <div id="res-steps" class="mt-3 space-y-4 text-slate-600 text-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuración de la API (Empty string por requerimiento del entorno)
        const apiKey = ""; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const photoPreview = document.getElementById('photo-preview');
        
        const btnStart = document.getElementById('btn-start');
        const btnCapture = document.getElementById('btn-capture');
        const btnReset = document.getElementById('btn-reset');
        
        const startOverlay = document.getElementById('start-overlay');
        const statusContainer = document.getElementById('status-container');
        const results = document.getElementById('results');

        let stream = null;

        // --- Función para iniciar cámara ---
        btnStart.addEventListener('click', async () => {
            try {
                // Forzamos cámara trasera con facingMode environment
                const constraints = {
                    video: { 
                        facingMode: { exact: "environment" },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };

                try {
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                } catch (e) {
                    // Fallback si no hay cámara trasera exacta (ej. en PC)
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                }

                video.srcObject = stream;
                
                // UI Updates
                startOverlay.classList.add('opacity-0', 'pointer-events-none');
                btnStart.classList.add('hidden');
                btnCapture.classList.remove('hidden');
                
            } catch (err) {
                console.error(err);
                alert("ERROR: No se pudo acceder a la cámara. Requisitos:\n1. Usar HTTPS (ej. GitHub Pages)\n2. Dar permiso de cámara.");
            }
        });

        // --- Capturar Foto ---
        btnCapture.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const base64Image = canvas.toDataURL('image/jpeg', 0.8);
            
            // UI
            photoPreview.src = base64Image;
            photoPreview.classList.remove('hidden');
            video.classList.add('hidden');
            btnCapture.classList.add('hidden');
            btnReset.classList.remove('hidden');
            
            processWithAI(base64Image.split(',')[1]);
        });

        // --- Reiniciar ---
        btnReset.addEventListener('click', () => {
            photoPreview.classList.add('hidden');
            video.classList.remove('hidden');
            btnReset.classList.add('hidden');
            btnCapture.classList.remove('hidden');
            results.classList.add('hidden');
        });

        // --- Procesamiento IA ---
        async function processWithAI(base64Data) {
            statusContainer.classList.remove('hidden');
            results.classList.add('hidden');

            const prompt = "Analiza los ingredientes de esta nevera y crea una receta. Responde en JSON: {titulo, detectados, ingredientes:[], pasos:[]}";

            try {
                const response = await fetchWithRetry(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: prompt },
                                    { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                                ]
                            }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    }
                );

                const data = await response.json();
                const recipe = JSON.parse(data.candidates[0].content.parts[0].text);
                
                renderRecipe(recipe);
            } catch (err) {
                alert("La IA no pudo procesar la imagen. Intenta de nuevo.");
            } finally {
                statusContainer.classList.add('hidden');
            }
        }

        function renderRecipe(data) {
            document.getElementById('res-title').innerText = data.titulo;
            document.getElementById('res-items').innerText = data.detectados;
            
            const ingList = document.getElementById('res-ingredients');
            ingList.innerHTML = '';
            data.ingredientes.forEach(i => {
                const li = document.createElement('li');
                li.innerText = i;
                ingList.appendChild(li);
            });

            const stepsDiv = document.getElementById('res-steps');
            stepsDiv.innerHTML = '';
            data.pasos.forEach((p, i) => {
                const step = document.createElement('div');
                step.className = "flex gap-3";
                step.innerHTML = `<span class="font-bold text-blue-500">${i+1}.</span><p>${p}</p>`;
                stepsDiv.appendChild(step);
            });

            results.classList.remove('hidden');
            results.scrollIntoView({ behavior: 'smooth' });
        }

        async function fetchWithRetry(url, options, retries = 5, delay = 1000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, options);
                    if (res.ok) return res;
                } catch (e) {}
                await new Promise(r => setTimeout(r, delay * Math.pow(2, i)));
            }
            throw new Error("Failed after retries");
        }
    </script>
</body>
</html>
